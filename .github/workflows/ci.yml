name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm run build

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare env
        run: cp .env.example .env
      - name: Build stack
        run: docker compose build --no-cache
      - name: Start stack
        run: docker compose up -d
      - name: Wait for backend health
        run: |
          for i in {1..40}; do
            if curl -fsS http://localhost:4443/api/v1/health; then
              exit 0
            fi
            sleep 3
          done
          docker compose logs
          exit 1
      - name: Auth status
        run: curl -fsS http://localhost:4443/api/v1/auth/status
      - name: Stop stack
        if: always()
        run: docker compose down -v
