name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm run build

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare env
        run: cp .env.example .env

      - name: Build stack
        run: docker compose build --no-cache

      - name: Start stack
        run: docker compose up -d

      - name: Wait for backend health
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:4443/api/v1/health; then
              exit 0
            fi
            docker compose ps
            docker compose logs --no-color --tail=120 backend postgres pgbouncer redis nats clickhouse
            sleep 3
          done
          docker compose ps
          docker compose logs --no-color
          exit 1

      - name: Smoke ready + metrics
        run: |
          curl -fsS http://localhost:4443/api/v1/ready
          curl -fsS http://localhost:4443/metrics

      - name: Auth status
        run: curl -fsS http://localhost:4443/api/v1/auth/status

      - name: README logo guard
        run: |
          if grep -q "trend-scope-logo-light.svg" README.md; then
            echo "README still references the deprecated SVG light logo fallback."
            exit 1
          fi

          if grep -q "trend-scope-logo-dark.svg" README.md; then
            echo "README still references the deprecated SVG dark logo fallback."
            exit 1
          fi

          grep -q "frontend/static/brand/trend-scope-logo-light.png" README.md
          grep -q "frontend/static/brand/trend-scope-logo-dark.png" README.md

      - name: Stop stack
        if: always()
        run: docker compose down -v
