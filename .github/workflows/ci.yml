name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "codex/**"
      - "feature/**"
      - "fix/**"
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Tests
        run: cargo test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Check
        run: npm run check

      - name: Build
        run: npm run build

  scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate bash scripts
        run: |
          bash -n scripts/go-live-check.sh
          bash -n scripts/preflight-prod.sh
          bash -n scripts/prod-up.sh
          bash -n scripts/prod-check.sh
          bash -n scripts/prod-logs.sh

      - name: Validate go-live skip mode
        run: |
          cp .env.production.example .env.production
          sed -i 's/change-me/test-secret-value/g' .env.production
          sed -i 's/replace-me/test-value/g' .env.production
          SKIP_REMOTE_CHECKS=1 ./scripts/go-live-check.sh

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare env
        run: cp .env.example .env

      - name: Build stack
        run: docker compose build --no-cache

      - name: Start dependencies
        run: docker compose up -d postgres pgbouncer redis nats clickhouse

      - name: Start backend
        run: docker compose up -d backend

      - name: Wait for backend health
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:4443/api/v1/health; then
              exit 0
            fi

            docker compose ps
            docker compose logs --no-color --tail=120 backend postgres pgbouncer redis nats clickhouse
            sleep 3
          done

          docker compose ps
          docker compose logs --no-color backend postgres pgbouncer redis nats clickhouse
          exit 1

      - name: Check ready metrics auth
        run: |
          curl -fsS http://localhost:4443/api/v1/ready
          curl -fsS http://localhost:4443/metrics
          curl -fsS http://localhost:4443/api/v1/auth/status

      - name: Start worker and frontend
        run: docker compose up -d worker frontend

      - name: Show stack
        run: docker compose ps

      - name: Dump docker logs on failure
        if: failure()
        run: |
          docker compose ps || true
          docker compose logs --no-color --tail=250 backend worker postgres pgbouncer redis nats clickhouse frontend || true

      - name: Stop stack
        if: always()
        run: docker compose down -v

  prod-compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare prod env
        run: cp .env.production.example .env.production

      - name: Validate production compose
        run: docker compose --env-file .env.production -f docker-compose.prod.yml config

      - name: Validate Traefik files
        run: |
          test -f infra/traefik/traefik.yml
          test -f infra/traefik/dynamic.example.yml
          if git ls-files --error-unmatch infra/traefik/dynamic.yml >/dev/null 2>&1; then
            echo "infra/traefik/dynamic.yml must not be tracked"
            exit 1
          fi

  repository-guards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure legacy ping workflow is removed
        run: |
          if [ -f .github/workflows/ci"-"ping.yml ]; then
            echo "Legacy ping workflow must be removed. Keep only .github/workflows/ci.yml"
            exit 1
          fi

          if grep -Rni "ci""-""ping" .github README.md docs; then
            echo "Legacy ping workflow references must be removed"
            exit 1
          fi

      - name: Alert channel scope guards
        run: |
          if grep -RniE "discord|slack" \
            frontend/src/routes/alerts \
            backend/src/routes/alerts.rs \
            backend/src/services/alerts.rs \
            .env.example \
            .env.production.example; then
            echo "Discord/Slack must not be active alert channels in the go-live scope."
            exit 1
          fi

          grep -q "telegram" frontend/src/routes/alerts/+page.svelte
          grep -q "TELEGRAM_BOT_TOKEN" .env.example
          grep -q "TELEGRAM_BOT_TOKEN" .env.production.example

      - name: Platform scope guards
        run: |
          grep -q "TikTok" README.md
          grep -q "bientôt disponible" README.md

      - name: Admin ops completeness guards
        run: |
          grep -q "Tests d'intégration" frontend/src/routes/admin/ops/+page.svelte
          grep -q "Smoke interne" frontend/src/routes/admin/ops/+page.svelte
          grep -q "Résultats des tests" frontend/src/routes/admin/ops/+page.svelte
          grep -q "Logs email" frontend/src/routes/admin/ops/+page.svelte
          grep -q "Notifications" frontend/src/routes/admin/ops/+page.svelte
          grep -q "Exports" frontend/src/routes/admin/ops/+page.svelte
          grep -q "error_message" frontend/src/routes/admin/ops/+page.svelte
          grep -q "file_url" frontend/src/routes/admin/ops/+page.svelte

      - name: Admin smoke correctness guards
        run: |
          grep -q '"blocking"' backend/src/routes/admin.rs
          grep -q "create_dir_all" backend/src/routes/admin.rs

          if grep -q '"metrics": "ok"' backend/src/routes/admin.rs; then
            echo "Admin smoke metrics must not be hardcoded to ok"
            exit 1
          fi

      - name: Admin contract guards
        run: |
          if grep -R "data.jobs.pending_reports" frontend/src/routes/admin; then
            echo "Frontend admin overview still reads old jobs.pending_reports contract"
            exit 1
          fi

          if grep -R "mrr_cents_estimate" frontend/src/routes/admin; then
            echo "Frontend admin billing still reads old mrr_cents_estimate contract"
            exit 1
          fi

          if grep -R "smtp_configured\|telegram_configured" frontend/src/routes/admin; then
            echo "Frontend admin ops still reads old smtp_configured/telegram_configured contract"
            exit 1
          fi

          if grep -R "d.postgres\|d.redis\|d.nats\|d.clickhouse" frontend/src/routes/admin/system; then
            echo "Frontend admin system still reads old flat system contract"
            exit 1
          fi

          if grep -R "FROM alerts WHERE enabled" backend/src; then
            echo "Backend must count enabled alert_rules, not alerts"
            exit 1
          fi

      - name: Admin ops UX guard
        run: |
          if grep -q "testAdminYoutube" frontend/src/routes/admin/ops/+page.svelte; then
            echo "User-facing admin ops button must not display testAdminYoutube"
            exit 1
          fi

          if grep -q "testAdminStripe" frontend/src/routes/admin/ops/+page.svelte; then
            echo "User-facing admin ops button must not display testAdminStripe"
            exit 1
          fi

          if grep -q "JSON.stringify" frontend/src/routes/admin/ops/+page.svelte; then
            echo "Admin ops must not display raw JSON.stringify results"
            exit 1
          fi
