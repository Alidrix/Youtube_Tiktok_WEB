name: CI

on:
  workflow_dispatch:

  push:
    branches:
      - main
      - "codex/**"
      - "feature/**"
      - "fix/**"

  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

jobs:
  ci-started:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Print CI context
        run: |
          echo "CI started"
          echo "event=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "sha=${{ github.sha }}"
          echo "actor=${{ github.actor }}"

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm run build

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare env
        run: cp .env.example .env

      - name: Build stack
        run: docker compose build --no-cache

      - name: Start dependency stack
        run: docker compose up -d postgres pgbouncer redis nats clickhouse

      - name: Start backend
        run: docker compose up -d backend

      - name: Wait for backend health
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:4443/api/v1/health; then
              exit 0
            fi
            docker compose ps
            docker compose logs --no-color --tail=160 backend postgres pgbouncer redis nats clickhouse
            sleep 3
          done
          docker compose ps
          docker compose logs --no-color backend postgres pgbouncer redis nats clickhouse
          exit 1

      - name: Start worker and frontend
        run: docker compose up -d worker frontend

      - name: Smoke ready + metrics
        run: |
          curl -fsS http://localhost:4443/api/v1/ready
          curl -fsS http://localhost:4443/metrics

      - name: Auth status
        run: curl -fsS http://localhost:4443/api/v1/auth/status

      - name: README logo guard
        run: |
          if grep -q "trend-scope-logo-light.svg" README.md; then
            echo "README still references the deprecated SVG light logo fallback."
            exit 1
          fi

          if grep -q "trend-scope-logo-dark.svg" README.md; then
            echo "README still references the deprecated SVG dark logo fallback."
            exit 1
          fi

          grep -q "frontend/static/brand/trend-scope-logo-light.png" README.md
          grep -q "frontend/static/brand/trend-scope-logo-dark.png" README.md


      - name: Studio business guards
        run: |
          if ! grep -q "process_pending_reports" backend/src/services/reports.rs; then
            echo "Reports service must expose process_pending_reports"
            exit 1
          fi
          if grep -q "pub async fn process_alert_rules_for_recent_trends(_pool: &PgPool) -> Result<u64, AppError> {
    Ok(0)" backend/src/services/alerts.rs; then
            echo "Alerts service must not be a pure Ok(0) placeholder"
            exit 1
          fi
          if grep -q "Endpoints admin accessibles" frontend/src/routes/admin/+page.svelte; then
            echo "Admin UI must not be placeholder"
            exit 1
          fi
          if grep -q "keywords:\[\]" frontend/src/routes/watchlist/+page.svelte; then
            echo "Watchlist UI must use real keywords"
            exit 1
          fi


      - name: Alert channel scope guards
        run: |
          echo "Checking that Discord/Slack are not active alert channels in product code..."

          if grep -RniE "discord|slack"             frontend/src/routes/alerts             backend/src/routes/alerts.rs             backend/src/services/alerts.rs             .env.example             .env.production.example; then
            echo "Discord/Slack must not be active alert channels in the go-live product scope."
            exit 1
          fi

          grep -q "telegram" frontend/src/routes/alerts/+page.svelte
          grep -q "TELEGRAM_BOT_TOKEN" .env.example
          grep -q "TELEGRAM_BOT_TOKEN" .env.production.example

      - name: Platform scope guards
        run: |
          grep -q "TikTok" README.md
          grep -q "bientôt disponible" README.md

      - name: Go-live stabilization guards
        run: |
          test -f .github/workflows/ci-ping.yml
          grep -q "build_report_summary" backend/src/services/reports.rs
          grep -q "alert_matches_rule" backend/src/services/alerts.rs
          grep -q "testAdminTelegram" frontend/src/lib/api.ts
          grep -q "testAdminSmtp" frontend/src/lib/api.ts
          test -f frontend/src/routes/admin/ops/+page.svelte


      - name: Final go-live guards
        run: |
          test -f .github/workflows/ci-ping.yml
          test -f scripts/go-live-check.sh
          test -f frontend/src/routes/admin/go-live/+page.svelte
          test -f frontend/src/lib/components/GoLiveChecklist.svelte
          grep -q "testAdminYoutube" frontend/src/lib/api.ts
          grep -q "testAdminStripe" frontend/src/lib/api.ts
          grep -q "fetchAdminGoLiveChecklist" frontend/src/lib/api.ts
          grep -q "go-live-checklist" backend/src/routes/admin.rs
          grep -q "test-youtube" backend/src/routes/admin.rs
          grep -q "test-stripe" backend/src/routes/admin.rs
          grep -q "trend_scope_users_total" backend/src/routes/metrics.rs

      - name: Validate scripts syntax
        run: |
          bash -n scripts/go-live-check.sh
          bash -n scripts/preflight-prod.sh
          bash -n scripts/prod-up.sh
          bash -n scripts/prod-check.sh
          bash -n scripts/prod-logs.sh


      - name: Final preprod completeness guards
        run: |
          grep -q "SKIP_REMOTE_CHECKS" scripts/go-live-check.sh
          grep -q "require_env" scripts/go-live-check.sh
          grep -q "check_url" scripts/go-live-check.sh
          grep -q "Blocking items remaining" frontend/src/routes/admin/go-live/+page.svelte
          grep -q "integrations.cloudflare" frontend/src/routes/admin/system/+page.svelte
          grep -q "storage.local_exports_dir" frontend/src/routes/admin/system/+page.svelte
          grep -q "subscriptions.pro" frontend/src/routes/admin/billing/+page.svelte
          grep -q "stripe.webhook_configured" frontend/src/routes/admin/billing/+page.svelte
          grep -q "plans.free" frontend/src/routes/admin/+page.svelte
          grep -q "alerts.rules_enabled" frontend/src/routes/admin/+page.svelte
          grep -q "emails.sent_24h" frontend/src/routes/admin/+page.svelte

      - name: Admin ops button labels guard
        run: |
          if grep -q "testAdminYoutube" frontend/src/routes/admin/ops/+page.svelte; then
            echo "User-facing admin ops button must not display testAdminYoutube"
            exit 1
          fi
          if grep -q "testAdminStripe" frontend/src/routes/admin/ops/+page.svelte; then
            echo "User-facing admin ops button must not display testAdminStripe"
            exit 1
          fi

      - name: Dump docker logs on failure
        if: failure()
        run: |
          docker compose ps || true
          docker compose logs --no-color --tail=250 backend worker postgres pgbouncer redis nats clickhouse frontend || true

      - name: Stop stack
        if: always()
        run: docker compose down -v

  prod-compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare prod env
        run: cp .env.production.example .env.production
      - name: Validate production compose
        run: docker compose --env-file .env.production -f docker-compose.prod.yml config
      - name: Repository policy checks
        run: |
          if git ls-files --error-unmatch infra/traefik/dynamic.yml >/dev/null 2>&1; then
            echo "infra/traefik/dynamic.yml must not be tracked"
            exit 1
          fi
          test -f infra/traefik/dynamic.example.yml
          grep -q "idx_videos_platform" db/migrations/init.sql
          if grep -q "platforms: \['youtube'\]" frontend/src/routes/watchlist/+page.svelte; then
            echo "watchlist page still contains hardcoded youtube platforms"
            exit 1
          fi
          if grep -q "Alerte VPH" frontend/src/routes/alerts/+page.svelte; then
            echo "alerts page still contains hardcoded Alerte VPH"
            exit 1
          fi
          if grep -q "Weekly report" frontend/src/routes/reports/+page.svelte; then
            echo "reports page still contains hardcoded Weekly report"
            exit 1
          fi
          grep -q "process_pending_reports" backend/src/bin/worker.rs
          grep -q "process_alert_rules_for_recent_trends" backend/src/bin/worker.rs
          grep -q "fetchAdminUsers" frontend/src/lib/api.ts
          grep -q "fetchAdminSources" frontend/src/lib/api.ts
          grep -q "platforms TEXT\[]" db/migrations/init.sql
          grep -q "format TEXT" db/migrations/init.sql

      - name: Validate Traefik and preflight files
        run: |
          test -f infra/traefik/traefik.yml
          test -f infra/traefik/dynamic.example.yml
          test -f scripts/preflight-prod.sh
      - name: Validate VITE_API_BASE build arg wiring
        run: |
          grep -q "ARG VITE_API_BASE" frontend/Dockerfile
          grep -q "VITE_API_BASE: \${VITE_API_BASE}" docker-compose.prod.yml


      - name: Admin contract guards
        run: |
          if grep -R "data.jobs.pending_reports" frontend/src/routes/admin; then echo "Frontend admin overview still reads old jobs.pending_reports contract"; exit 1; fi
          if grep -R "mrr_cents_estimate" frontend/src/routes/admin; then echo "Frontend admin billing still reads old mrr_cents_estimate contract"; exit 1; fi
          if grep -R "smtp_configured\|telegram_configured" frontend/src/routes/admin; then echo "Frontend admin ops still reads old smtp_configured/telegram_configured contract"; exit 1; fi
          if grep -R "d.postgres\|d.redis\|d.nats\|d.clickhouse" frontend/src/routes/admin/system; then echo "Frontend admin system still reads old flat system contract"; exit 1; fi
          if grep -R "FROM alerts WHERE enabled" backend/src; then echo "Backend must count enabled alert_rules, not alerts"; exit 1; fi
      - name: Admin go-live UI guards
        run: |
          grep -q "testAdminYoutube" frontend/src/routes/admin/ops/+page.svelte
          grep -q "testAdminStripe" frontend/src/routes/admin/ops/+page.svelte
          grep -q "integrations" frontend/src/routes/admin/ops/+page.svelte
          grep -q "services" frontend/src/routes/admin/system/+page.svelte
          grep -q "mrr.estimate_cents" frontend/src/routes/admin/billing/+page.svelte
          grep -q "reports.pending" frontend/src/routes/admin/+page.svelte

      - name: Final admin polish guards
        run: |
          grep -q "fetchAdminSmoke" frontend/src/lib/api.ts
          grep -q "/api/v1/admin/smoke" backend/src/app.rs
          grep -q "Blocking checks" frontend/src/lib/components/GoLiveChecklist.svelte
          grep -q "MRR estimé" frontend/src/routes/admin/billing/+page.svelte
          grep -q "testAdminYoutube" frontend/src/routes/admin/ops/+page.svelte
          grep -q "testAdminStripe" frontend/src/routes/admin/ops/+page.svelte
          grep -q "AdminSection" frontend/src/routes/admin/ops/+page.svelte
          grep -q "DataTable" frontend/src/routes/admin/ops/+page.svelte

      - name: Admin ops UX guard
        run: |
          if grep -q "JSON.stringify" frontend/src/routes/admin/ops/+page.svelte; then
            echo "Admin ops must not display raw JSON.stringify results"
            exit 1
          fi
