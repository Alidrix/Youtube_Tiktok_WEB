services:
  postgres:
    image: postgres:16-alpine
    env_file: .env.production
    environment:
      POSTGRES_DB: viral_radar
      POSTGRES_USER: viral
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U viral -d viral_radar"]
      interval: 10s
      timeout: 5s
      retries: 8

  pgbouncer:
    image: edoburu/pgbouncer:latest
    env_file: .env.production
    environment:
      DB_HOST: postgres
      DB_USER: viral
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      DB_NAME: viral_radar
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2-alpine
    command: ["-js", "-sd", "/data"]
    volumes:
      - nats_data:/data
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    env_file: .env.production
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env.production
    command: ["/app/api"]
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
      nats:
        condition: service_started
      clickhouse:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4443/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env.production
    command: ["/app/worker"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
      clickhouse:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file: .env.production
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  reverse-proxy:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  nats_data:
  clickhouse_data:
