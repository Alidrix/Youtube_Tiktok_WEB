services:
  traefik:
    image: traefik:v3.4
    container_name: trend-scope-traefik
    restart: unless-stopped
    env_file: .env.production
    command:
      - "--configFile=/etc/traefik/traefik.yml"
      - "--certificatesresolvers.cloudflare.acme.email=${ACME_EMAIL}"
    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./infra/traefik/traefik.yml:/etc/traefik/traefik.yml:ro"
      - "./infra/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro"
      - "./infra/traefik/acme:/letsencrypt"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`${TRAEFIK_DOMAIN}`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls=true"
      - "traefik.http.routers.traefik.tls.certresolver=cloudflare"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.middlewares=security-headers@file,dashboard-auth@file"
    networks:
      - trend-scope-public
      - trend-scope-private

  postgres:
    image: postgres:16-alpine
    env_file: .env.production
    environment:
      POSTGRES_DB: viral_radar
      POSTGRES_USER: viral
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U viral -d viral_radar"]
      interval: 10s
      timeout: 5s
      retries: 8
    networks:
      - trend-scope-private

  pgbouncer:
    image: edoburu/pgbouncer:latest
    env_file: .env.production
    environment:
      DB_HOST: postgres
      DB_USER: viral
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      DB_NAME: viral_radar
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 5432 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - trend-scope-private

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trend-scope-private

  nats:
    image: nats:2-alpine
    command: ["-js", "-sd", "/data"]
    volumes:
      - nats_data:/data
    restart: unless-stopped
    networks:
      - trend-scope-private

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    env_file: .env.production
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    restart: unless-stopped
    networks:
      - trend-scope-private

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env.production
    command: ["/app/api"]
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
      clickhouse:
        condition: service_started
    restart: unless-stopped
    expose:
      - "4443"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls=true"
      - "traefik.http.routers.backend.tls.certresolver=cloudflare"
      - "traefik.http.routers.backend.middlewares=security-headers@file,gzip@file,api-rate-limit@file"
      - "traefik.http.services.backend.loadbalancer.server.port=4443"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4443/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s
    networks:
      - trend-scope-private

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env.production
    command: ["/app/worker"]
    depends_on:
      backend:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
      clickhouse:
        condition: service_started
    restart: unless-stopped
    networks:
      - trend-scope-private

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE}
    env_file: .env.production
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    expose:
      - "5173"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${APP_DOMAIN}`) || Host(`${APP_WWW_DOMAIN}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.routers.frontend.tls.certresolver=cloudflare"
      - "traefik.http.routers.frontend.middlewares=security-headers@file,gzip@file"
      - "traefik.http.services.frontend.loadbalancer.server.port=5173"
    networks:
      - trend-scope-private

volumes:
  postgres_data:
  redis_data:
  nats_data:
  clickhouse_data:

networks:
  trend-scope-public:
  trend-scope-private:
    internal: true
