http:
  middlewares:
    security-headers:
      headers:
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        permissionsPolicy: "camera=(), microphone=(), geolocation=()"
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true

    gzip:
      compress: {}

    api-rate-limit:
      rateLimit:
        average: 100
        burst: 50

    dashboard-auth:
      basicAuth:
        users:
          - "admin:replace-with-bcrypt-hash"
