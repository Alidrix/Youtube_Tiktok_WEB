groups:
  - name: trend-scope-alerts
    rules:
      - alert: TrendScopeBackendDown
        expr: up{job="trend-scope-backend"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Trend Scope backend is down"
          description: "Prometheus cannot scrape /metrics from the backend."

      - alert: TrendScopeHighFailedReports
        expr: trend_scope_reports_failed_total > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Failed reports detected"
          description: "At least one report is in failed status."

      - alert: TrendScopeFailedEmails
        expr: trend_scope_email_logs_failed_total > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Failed emails detected"
          description: "Email logs contain failed deliveries."

      - alert: TrendScopeUnreadNotificationsHigh
        expr: trend_scope_notifications_unread_total > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Unread notifications are high"
          description: "Unread notifications exceed 100."

      - alert: TrendScopePendingReportsHigh
        expr: trend_scope_reports_pending > 20
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Pending reports are high"
          description: "Pending reports exceed 20 for more than 10 minutes."

      - alert: TrendScopeAlertDeliveryFailures
        expr: trend_scope_alert_deliveries_failed_total > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Alert delivery failures detected"
          description: "At least one alert delivery failed."


      - alert: TrendScopeHttpProbeFailed
        expr: probe_success{job="blackbox-http"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "HTTP probe failed"
          description: "Blackbox probe failed for {{ $labels.instance }}."

      - alert: TrendScopeHostDiskLow
        expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}) < 0.10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Host disk space is low"
          description: "Disk space is below 10% on {{ $labels.mountpoint }}."

      - alert: TrendScopeHostMemoryLow
        expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) < 0.10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Host memory is low"
          description: "Available memory is below 10%."

      - alert: TrendScopeContainerCpuHigh
        expr: sum(rate(container_cpu_usage_seconds_total{name!=""}[5m])) by (name) > 0.8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Container CPU usage high"
          description: "Container {{ $labels.name }} CPU usage is high."
