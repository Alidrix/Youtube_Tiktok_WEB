global:
  resolve_timeout: 5m

route:
  receiver: internal-webhook
  group_by:
    - alertname
    - severity
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: internal-webhook
    webhook_configs:
      - url: http://backend:4443/api/v1/monitoring/alertmanager-webhook
        send_resolved: true
