services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: viral_radar
      POSTGRES_USER: viral
      POSTGRES_PASSWORD: viral
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U viral -d viral_radar"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DB_HOST: postgres
      DB_USER: viral
      DB_PASSWORD: viral
      DB_NAME: viral_radar
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 50
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '6432:5432'
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 5432 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nats:
    image: nats:2-alpine
    command: ["-js", "-m", "8222", "-sd", "/data"]
    ports:
      - '4222:4222'
      - '8222:8222'
    volumes:
      - nats_data:/data
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    environment:
      CLICKHOUSE_DB: viral_analytics
      CLICKHOUSE_USER: viral
      CLICKHOUSE_PASSWORD: viral
    ports:
      - '8123:8123'
      - '9000:9000'
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    environment:
      RUST_LOG: info
    command: ["/app/api"]
    ports:
      - '4443:4443'
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
      clickhouse:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4443/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["/app/worker"]
    env_file: .env
    depends_on:
      backend:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
      clickhouse:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: http://localhost:4443/api/v1
    env_file: .env
    ports:
      - '5173:5173'
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  nats_data:
  clickhouse_data:
