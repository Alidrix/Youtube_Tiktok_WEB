services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      RUST_LOG: info
    ports:
      - '4443:4443'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      VITE_API_BASE: http://localhost:4443/api/v1
    ports:
      - '5173:5173'
    depends_on:
      - backend
