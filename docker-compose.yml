services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    environment:
      RUST_LOG: info
    ports:
      - '4443:4443'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4443/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      VITE_API_BASE: http://localhost:4443/api/v1
    ports:
      - '5173:5173'
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
