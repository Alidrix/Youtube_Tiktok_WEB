<svg xmlns="http://www.w3.org/2000/svg" width="1254" height="1254" viewBox="0 0 1254 1254" role="img" aria-labelledby="title desc">
  <title id="title">Trend Scope logo — dark version</title>
  <desc id="desc">Trend Scope monogram with white letters, purple to cyan target ring and Create Success tagline on a dark background.</desc>
  <defs>
